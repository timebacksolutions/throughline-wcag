uid: SR-0075
type: system_requirement
status: approved
title: Consistent Help (A)
text: 'If a web page contains any of the following help mechanisms, and those mechanisms are
  repeated on multiple web pages within a set of web pages, they occur in the same order relative
  to other page content, unless a change is initiated by the user: Human contact details; Human
  contact mechanism; Self-help option; A fully automated contact mechanism. Note 1Help mechanisms
  may be provided directly on the page, or may be provided via a direct link to a different
  page containing the information. Note 2For this success criterion, "the same order relative
  to other page content" can be thought of as how the content is ordered when the page is serialized.
  The visual position of a help mechanism is likely to be consistent across pages for the same
  page variation (e.g., CSS break-point). The user can initiate a change, such as changing the
  page''s zoom or orientation, which may trigger a different page variation. This criterion
  is concerned with relative order across pages displayed in the same page variation (e.g.,
  same zoom level and orientation).'
rationale: The intent of this success criterion is to ensure users can find help for completing
  tasks on a website, when it is available. When the placement of the help mechanism is kept
  consistent across a set of pages, users looking for help will find it easier to identify.
  This is distinct from interface-level help, such as contextual help, features like spell checkers,
  and instructional text in a form.
