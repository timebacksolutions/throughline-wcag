uid: SR-0006
type: system_requirement
status: approved
title: Audio Description (Prerecorded) (AA)
text: Audio description is provided for all prerecorded video content in synchronized media.
rationale: The intent of this success criterion is to provide people who are blind or visually
  impaired access to the visual information in a synchronized media presentation in the same
  human language as the video or page on which it appears. The audio description augments the
  audio portion of the presentation with the information needed when the video portion is not
  available. During existing pauses in dialogue, audio description provides information about
  actions, characters, scene changes, and on-screen text that are important and are not described
  or spoken in the main sound track.
