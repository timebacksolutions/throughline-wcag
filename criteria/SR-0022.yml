uid: SR-0022
type: system_requirement
status: approved
title: Contrast (Enhanced) (AAA)
text: 'The visual presentation of text and images of text has a contrast ratio of at least 7:1,
  except for the following: Large Text Large-scale text and images of large-scale text have
  a contrast ratio of at least 4.5:1; Incidental Text or images of text that are part of an
  inactive user interface component, that are pure decoration, that are not visible to anyone,
  or that are part of a picture that contains significant other visual content, have no contrast
  requirement. Logotypes Text that is part of a logo or brand name has no contrast requirement.'
rationale: The intent of this success criterion is to provide enough contrast between text and
  its background so that it can be read by people with moderately low vision (who do not use
  contrast-enhancing assistive technology). For people without color deficiencies, hue and saturation
  have minimal or no effect on legibility as assessed by reading performance (Knoblauch et al.,
  1991). Color deficiencies can affect luminance contrast somewhat. Therefore, in the recommendation,
  the contrast is calculated in such a way that color is not a key factor so that people who
  have a color vision deficit will also have adequate contrast between the text and the background.
