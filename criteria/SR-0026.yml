uid: SR-0026
type: system_requirement
status: approved
title: Reflow (AA)
text: 'Content can be presented without loss of information or functionality, and without requiring
  scrolling in two dimensions for: Vertical scrolling content at a width equivalent to 320 CSS
  pixels; Horizontal scrolling content at a height equivalent to 256 CSS pixels. Except for
  parts of the content which require two-dimensional layout for usage or meaning. Note 1320
  CSS pixels is equivalent to a starting viewport width of 1280 CSS pixels wide at 400% zoom.
  For web content which is designed to scroll horizontally (e.g., with vertical text), 256 CSS
  pixels is equivalent to a starting viewport height of 1024 CSS pixels at 400% zoom. Note 2Examples
  of content which requires two-dimensional layout are images required for understanding (such
  as maps and diagrams), video, games, presentations, data tables (not individual cells), and
  interfaces where it is necessary to keep toolbars in view while manipulating content. It is
  acceptable to provide two-dimensional scrolling for such parts of the content.'
rationale: The intent of this success criterion is to let users enlarge text and other related
  content without having to scroll in two dimensions to read. When lines of text extend beyond
  the edge of a viewport, users will be forced to scroll back-and-forth to read line by line.
  This can cause them to lose their place and can significantly increase both physical and cognitive
  effort. Therefore, most sections of content are expected to reflow within the appropriate
  sizing requirement defined by this success criterion.
