uid: SR-0019
type: system_requirement
status: approved
title: Contrast (Minimum) (AA)
text: 'The visual presentation of text and images of text has a contrast ratio of at least 4.5:1,
  except for the following: Large Text Large-scale text and images of large-scale text have
  a contrast ratio of at least 3:1; Incidental Text or images of text that are part of an inactive
  user interface component, that are pure decoration, that are not visible to anyone, or that
  are part of a picture that contains significant other visual content, have no contrast requirement.
  Logotypes Text that is part of a logo or brand name has no contrast requirement.'
rationale: The intent of this success criterion is to provide enough contrast between text and
  its background, so that it can be read by people with moderately low vision or impaired contrast
  perception, without the use of contrast-enhancing assistive technology.
links:
- target: UR-0004
  type: implements
