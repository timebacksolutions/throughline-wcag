uid: SR-0053
type: system_requirement
status: approved
title: Focus Not Obscured (Minimum) (AA)
text: When a user interface component receives keyboard focus, the component is not entirely
  hidden due to author-created content. Note 1Where content in a configurable interface can
  be repositioned by the user, then only the initial positions of user-movable content are considered
  for testing and conformance of this success criterion. Note 2Content opened by the user may
  obscure the component receiving focus. If the user can reveal the focused component without
  advancing the keyboard focus, the component with focus is not considered visually hidden due
  to author-created content.
rationale: The intent of this success criterion is to ensure that the item receiving keyboard
  focus is always partially visible in the user's viewport. For sighted people who rely on a
  keyboard (or on a device that operates through the keyboard interface, such as a switch or
  voice input), knowing the current point of focus is critical. The component with focus signals
  the interaction point on the page. Where users cannot see the item with focus, they may not
  know how to proceed, or may even think the system has become unresponsive.
links:
