title: Parsing (Obsolete and removed) (A)
text: NoteThis criterion was originally adopted to address problems that assistive technology
  had directly parsing HTML. Assistive technology no longer has any need to directly parse HTML.
  Consequently, these problems either no longer exist or are addressed by other criteria. This
  criterion no longer has utility and is removed.
rationale: This criterion has been removed from WCAG 2.2.
