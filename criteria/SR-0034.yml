uid: SR-0034
type: system_requirement
status: approved
title: Timing Adjustable (A)
text: 'For each time limit that is set by the content, at least one of the following is true:
  Turn off The user is allowed to turn off the time limit before encountering it; or Adjust
  The user is allowed to adjust the time limit before encountering it over a wide range that
  is at least ten times the length of the default setting; or Extend The user is warned before
  time expires and given at least 20 seconds to extend the time limit with a simple action (for
  example, "press the space bar"), and the user is allowed to extend the time limit at least
  ten times; or Real-time Exception The time limit is a required part of a real-time event (for
  example, an auction), and no alternative to the time limit is possible; or Essential Exception
  The time limit is essential and extending it would invalidate the activity; or 20 Hour Exception
  The time limit is longer than 20 hours. NoteThis success criterion helps ensure that users
  can complete tasks without unexpected changes in content or context that are a result of a
  time limit. This success criterion should be considered in conjunction with Success Criterion
  3.2.1, which puts limits on changes of content or context as a result of user action.'
rationale: The intent of this success criterion is to ensure that users with disabilities are
  given adequate time to interact with web content whenever possible. People with disabilities
  such as blindness, low vision, dexterity impairments, and cognitive limitations may require
  more time to read content or to perform functions such as filling out on-line forms. If web
  functions are time-dependent, it will be difficult for some users to perform the required
  action before a time limit occurs. This may render the service inaccessible to them. Designing
  functions that are not time-dependent will help people with disabilities succeed at completing
  these functions. Providing options to disable time limits, customize the length of time limits,
  or request more time before a time limit occurs helps those users who require more time than
  expected to successfully complete tasks. These options are listed in the order that will be
  most helpful for the user. Disabling time limits is better than customizing the length of
  time limits, which is better than requesting more time before a time limit occurs.
