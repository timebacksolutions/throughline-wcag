uid: SR-0028
type: system_requirement
status: approved
title: Text Spacing (AA)
text: 'In content implemented using markup languages that support the following text style properties,
  no loss of content or functionality occurs by setting all of the following and by changing
  no other style property: Line height (line spacing) to at least 1.5 times the font size; Spacing
  following paragraphs to at least 2 times the font size; Letter spacing (tracking) to at least
  0.12 times the font size; Word spacing to at least 0.16 times the font size. Exception: Human
  languages and scripts that do not make use of one or more of these text style properties in
  written text can conform using only the properties that exist for that combination of language
  and script. Note 1Content is not required to use these text spacing values. The requirement
  is to ensure that when a user overrides the authored text spacing, content or functionality
  is not lost. Note 2Writing systems for some languages use different text spacing settings,
  such as paragraph start indent. Authors are encouraged to follow locally available guidance
  for improving readability and legibility of text in their writing system.'
rationale: The intent of this success criterion (SC) is to ensure that when people override
  author-specified text spacing to improve their reading experience, content is still readable
  and operable. Each of the requirements stipulated in the SC's four bullets helps ensure text
  styling can be adapted by the user to suit their needs.
