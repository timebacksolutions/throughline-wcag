uid: SR-0015
type: system_requirement
status: approved
title: Identify Input Purpose (AA)
text: 'The purpose of each input field collecting information about the user can be programmatically
  determined when: The input field serves a purpose identified in the Input Purposes for user
  interface components section; and The content is implemented using technologies with support
  for identifying the expected meaning for form input data.'
rationale: The intent of this success criterion is to ensure that the purpose of a form input
  collecting information about the user can be programmatically determined, so that user agents
  can extract and present this purpose to users using different modalities. The ability to programmatically
  declare the specific kind of data expected in a particular field makes filling out forms easier,
  especially for people with certain cognitive disabilities.
