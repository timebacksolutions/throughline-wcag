uid: SR-0052
type: system_requirement
status: approved
title: Section Headings (AAA)
text: Section headings are used to organize the content. Note 1"Heading" is used in its general
  sense and includes titles and other ways to add a heading to different types of content. Note
  2This success criterion covers sections within writing, not user interface components. User
  interface components are covered under Success Criterion 4.1.2.
rationale: The intent of this success criterion is to provide headings for sections of a web
  page, when the page is organized into sections. For instance, long documents are often divided
  into a variety of chapters, chapters have subtopics, etc. When such sections exist, they need
  to have headings that introduce them. This clearly indicates the organization of the content,
  facilitates navigation within the content, and provides mental "handles" that aid in comprehension
  of the content. Other page elements may complement headings to improve presentation (e.g.,
  horizontal rules and boxes), but visual presentation is not sufficient to identify document
  sections.
