uid: SR-0044
type: system_requirement
status: approved
title: Page Titled (A)
text: Web pages have titles that describe topic or purpose.
rationale: The intent of this success criterion is to help users find content and orient themselves
  within it by ensuring that each web page has a descriptive title. Titles identify the current
  location without requiring users to read or interpret page content. When titles appear in
  site maps or lists of search results, users can more quickly identify the content they need.
  User agents make the title of the page easily available to the user for identifying the page.
  For instance, a user agent may display the page title in the window title bar or as the name
  of the tab containing the page.
links:
