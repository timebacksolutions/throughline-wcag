uid: SR-0029
type: system_requirement
status: approved
title: Content on Hover or Focus (AA)
text: 'Where receiving and then removing pointer hover or keyboard focus triggers additional
  content to become visible and then hidden, the following are true: Dismissible A mechanism
  is available to dismiss the additional content without moving pointer hover or keyboard focus,
  unless the additional content communicates an input error or does not obscure or replace other
  content; Hoverable If pointer hover can trigger the additional content, then the pointer can
  be moved over the additional content without the additional content disappearing; Persistent
  The additional content remains visible until the hover or focus trigger is removed, the user
  dismisses it, or its information is no longer valid. Exception: The visual presentation of
  the additional content is controlled by the user agent and is not modified by the author.
  Note 1Examples of additional content controlled by the user agent include browser tooltips
  created through use of the HTML title attribute [HTML]. Note 2Custom tooltips, sub-menus,
  and other nonmodal popups that display on hover and focus are examples of additional content
  covered by this criterion. Note 3This criterion applies to content that appears in addition
  to the triggering component itself. Since hidden components that are made visible on keyboard
  focus (such as links used to skip to another part of a page) do not present additional content
  they are not covered by this criterion.'
rationale: 'Additional content that appears and disappears in coordination with keyboard focus
  or pointer hover often leads to accessibility issues. Reasons for such issues include:'
