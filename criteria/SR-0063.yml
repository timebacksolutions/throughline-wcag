uid: SR-0063
type: system_requirement
status: approved
title: Target Size (Minimum) (AA)
text: 'The size of the target for pointer inputs is at least 24 by 24 CSS pixels, except when:
  Spacing Undersized targets (those less than 24 by 24 CSS pixels) are positioned so that if
  a 24 CSS pixel diameter circle is centered on the bounding box of each, the circles do not
  intersect another target or the circle for another undersized target; Equivalent The function
  can be achieved through a different control on the same page that meets this criterion; Inline
  The target is in a sentence or its size is otherwise constrained by the line-height of non-target
  text; User Agent Control The size of the target is determined by the user agent and is not
  modified by the author; Essential A particular presentation of the target is essential or
  is legally required for the information being conveyed. Note 1Targets that allow for values
  to be selected spatially based on position within the target are considered one target for
  the purpose of the success criterion. Examples include sliders, color pickers displaying a
  gradient of colors, or editable areas where you position the cursor. Note 2For inline targets
  the line-height should be interpreted as perpendicular to the flow of text. For example, in
  a language displayed vertically, the line-height would be horizontal.'
rationale: The intent of this success criterion is to help ensure targets can be easily activated
  without accidentally activating an adjacent target. Users with dexterity limitations and those
  who have difficulty with fine motor movement find it difficult to accurately activate small
  targets when there are other targets that are too close. Providing sufficient size, or sufficient
  spacing between targets, will reduce the likelihood of accidentally activating the wrong control.
