uid: SR-0058
type: system_requirement
status: approved
title: Label in Name (A)
text: For user interface components with labels that include text or images of text, the name
  contains the text that is presented visually. NoteA best practice is to have the text of the
  label at the start of the name.
rationale: The intent of this success criterion is to ensure that the words which visually label
  a component are also the words associated with the component programmatically. This helps
  ensure that people with disabilities can rely on visible labels as a means to interact with
  the components.
links:
- target: UR-0009
  type: implements
