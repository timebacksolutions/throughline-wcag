uid: SR-0043
type: system_requirement
status: approved
title: Bypass Blocks (A)
text: A mechanism is available to bypass blocks of content that are repeated on multiple web
  pages.
rationale: The intent of this success criterion is to allow people who navigate sequentially
  through content more direct access to the primary content of the web page. Web pages and applications
  often have content that appears on other pages or screens. Examples of repeated blocks of
  content include but are not limited to navigation links, header content, and advertising frames.
  Small repeated sections such as individual words, phrases or single links are not considered
  blocks for the purposes of this provision.
