uid: SR-0060
type: system_requirement
status: approved
title: Target Size (Enhanced) (AAA)
text: 'The size of the target for pointer inputs is at least 44 by 44 CSS pixels except when:
  Equivalent The target is available through an equivalent link or control on the same page
  that is at least 44 by 44 CSS pixels; Inline The target is in a sentence or block of text;
  User Agent Control The size of the target is determined by the user agent and is not modified
  by the author; Essential A particular presentation of the target is essential to the information
  being conveyed.'
rationale: The intent of this success criterion is to help users who may have trouble activating
  a small target because of hand tremors, limited dexterity, or other reasons. If the target
  is too small, it may be difficult to aim at the target. Mice and similar pointing devices
  can be hard to use for these users, and a larger target will help them greatly in having positive
  outcomes on the web page.
