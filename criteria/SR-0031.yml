uid: SR-0031
type: system_requirement
status: approved
title: No Keyboard Trap (A)
text: 'If keyboard focus can be moved to a component of the page using a keyboard interface,
  then focus can be moved away from that component using only a keyboard interface, and, if
  it requires more than unmodified arrow or tab keys or other standard exit methods, the user
  is advised of the method for moving focus away. NoteSince any content that does not meet this
  success criterion can interfere with a user''s ability to use the whole page, all content
  on the web page (whether it is used to meet other success criteria or not) must meet this
  success criterion. See Conformance Requirement 5: Non-Interference.'
rationale: The intent of this success criterion is to ensure that content does not "trap" keyboard
  focus within subsections of content on a web page. This is a common problem when multiple
  formats are combined within a page and rendered using plug-ins or embedded applications, or
  when custom components and widgets are not implemented with keyboard users in mind.
