uid: SR-0039
type: system_requirement
status: approved
title: Timeouts (AAA)
text: Users are warned of the duration of any user inactivity that could cause data loss, unless
  the data is preserved for more than 20 hours when the user does not take any actions. NotePrivacy
  regulations may require explicit user consent before user identification has been authenticated
  and before user data is preserved. In cases where the user is a minor, explicit consent may
  not be solicited in most jurisdictions, countries or regions. Consultation with privacy professionals
  and legal counsel is advised when considering data preservation as an approach to satisfy
  this success criterion.
rationale: The intent of this success criterion is to ensure that when a timeout is used, users
  know what duration of inactivity will cause the page to time out and result in lost data.
  The use of timed events can present significant barriers for users with cognitive disabilities,
  as these users may require more time to read content or to perform functions, such as completing
  an online form.
