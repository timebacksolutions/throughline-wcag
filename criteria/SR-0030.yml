uid: SR-0030
type: system_requirement
status: approved
title: Keyboard (A)
text: All functionality of the content is operable through a keyboard interface without requiring
  specific timings for individual keystrokes, except where the underlying function requires
  input that depends on the path of the user's movement and not just the endpoints. Note 1This
  exception relates to the underlying function, not the input technique. For example, if using
  handwriting to enter text, the input technique (handwriting) requires path-dependent input
  but the underlying function (text input) does not. Note 2This does not forbid and should not
  discourage providing mouse input or other input methods in addition to keyboard operation.
rationale: The intent of this success criterion is to ensure that, wherever possible, content
  can be operated through a keyboard or keyboard interface (so an alternate keyboard can be
  used). When content can be operated through a keyboard or alternate keyboard, it is operable
  by people with no vision (who cannot use devices such as mice that require eye-hand coordination)
  as well as by people who must use alternate keyboards or input devices that act as keyboard
  emulators. Keyboard emulators include speech input software, sip-and-puff software, on-screen
  keyboards, scanning software and a variety of assistive technologies and alternate keyboards.
  Individuals with low vision also may have trouble tracking a pointer and find the use of software
  much easier (or only possible) if they can control it from the keyboard.
