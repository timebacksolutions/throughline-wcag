uid: SR-0064
type: system_requirement
status: approved
title: Language of Page (A)
text: The default human language of each web page can be programmatically determined.
rationale: The intent of this success criterion is to ensure that content developers provide
  information in the web page that user agents need to present text and other linguistic content
  correctly. Both assistive technologies and conventional user agents can render text more accurately
  when the language of the web page is identified. Screen readers can load the correct pronunciation
  rules. Visual browsers can display characters and scripts correctly. Media players can show
  captions correctly. As a result, users with disabilities will be better able to understand
  the content.
