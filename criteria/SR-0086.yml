uid: SR-0086
type: system_requirement
status: approved
title: Name, Role, Value (A)
text: 'For all user interface components (including but not limited to: form elements, links
  and components generated by scripts), the name and role can be programmatically determined;
  states, properties, and values that can be set by the user can be programmatically set; and
  notification of changes to these items is available to user agents, including assistive technologies.
  NoteThis success criterion is primarily for web authors who develop or script their own user
  interface components. For example, standard HTML controls already meet this success criterion
  when used according to specification.'
rationale: The intent of this success criterion is to ensure that Assistive Technologies (AT)
  can gather appropriate information about, activate (or set) and keep up to date on the status
  of user interface controls in the content.
