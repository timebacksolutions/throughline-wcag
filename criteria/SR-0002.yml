uid: SR-0002
type: system_requirement
status: approved
title: Audio-only and Video-only (Prerecorded) (A)
text: 'For prerecorded audio-only and prerecorded video-only media, the following are true,
  except when the audio or video is a media alternative for text and is clearly labeled as such:
  Prerecorded Audio-only An alternative for time-based media is provided that presents equivalent
  information for prerecorded audio-only content. Prerecorded Video-only Either an alternative
  for time-based media or an audio track is provided that presents equivalent information for
  prerecorded video-only content.'
rationale: The intent of this success criterion is to make information conveyed by prerecorded
  audio-only and prerecorded video-only content available to all users. Alternatives for time-based
  media that are text based make information accessible because text can be rendered through
  any sensory modality (for example, visual, auditory or tactile) to match the needs of the
  user. In the future, text could also be translated into symbols, sign language or simpler
  forms of the language (future).
