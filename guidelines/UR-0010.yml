uid: UR-0010
type: user_requirement
status: approved
title: Readable — Make text content readable and understandable.
text: Make text content readable and understandable.
rationale: Text must be readable and its language machine-identifiable so assistive technology
  can pronounce it and users can understand unusual words and abbreviations.
