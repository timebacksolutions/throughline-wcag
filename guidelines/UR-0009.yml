title: Input Modalities — Make it easier for users to operate functionality through various
  inputs beyond keyboard.
text: Make it easier for users to operate functionality through various inputs beyond keyboard.
rationale: People operate devices in many ways beyond a keyboard — touch, pointer, voice, motion
  — and each must work without requiring precise or tiring gestures.
